<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enter Home Details</title>
  <link rel="stylesheet" href="/output.css">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">
    
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
      Add Your Home
    </h2>

    <form action="/admin/add-home" method="POST" class="space-y-4">
      
      <input 
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-rose-400"
        type="text" 
        name="HomeName" 
        placeholder="Enter your home name"
        required
      />

      <button 
        class="w-full bg-rose-500 hover:bg-rose-600 text-white py-2 rounded-lg font-semibold transition">
        Submit
      </button>

    </form>

  </div>

</body>
</html>
